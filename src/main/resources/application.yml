spring:
  application:
    name: k8s-panel
    version: 1.0.0
  session:
    store-type: redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      ttl: 3600
  profiles:
    active: local

server:
  port: 8080
  servlet:
    context-path: /api

# springdoc-openapi项目配置
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.ficn.panel.controller

oidc:
  issuer: http://localhost:8081/realms/auth-demo
  client-id: k8s-auth
  client-secret: xxx
  scope: openid

cluster:
  cluster-url: http://localhost:6443

# Log
logging:
  charset:
    console: UTF-8
    file: UTF-8